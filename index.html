<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ragdoll Life - Landscape Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* --- CORE SETUP --- */
        body {
            margin: 0; padding: 0; background-color: #0f0f15;
            font-family: 'VT323', monospace; display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; user-select: none; overflow: hidden; touch-action: none;
        }
        
        #game-container {
            width: 100vw; height: 100vh; position: relative; overflow: hidden; 
        }
        
        #bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('my_room.jpg'); 
            background-size: cover; background-position: center; z-index: 1;
            transition: filter 1.5s ease;
        }

        /* --- PORTRAIT LOCK OVERLAY --- */
        #landscape-lock {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 99999; color: #fff; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; font-size: 32px;
        }
        @media screen and (orientation: portrait) {
            #landscape-lock { display: flex; }
            #game-container { display: none; }
        }

        /* --- UI GLASSMORPHISM --- */
        .glass-panel {
            background: rgba(15, 15, 25, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); color: #fff; text-shadow: 1px 1px 0 #000;
        }

        /* --- SPRITE LAYER --- */
        #cat-group {
            position: absolute; top: 55%; left: 50%; width: 200px; height: 200px; 
            z-index: 2; transform: translate(-50%, -50%);
            transition: left 3s linear; /* Smooth walking */
            cursor: pointer;
        }
        .main-sprite {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; z-index: 3; image-rendering: pixelated;
            transform-origin: bottom center; transition: filter 0.5s ease;
        }
        .kitten-sprite {
            width: 70px; height: 70px; object-fit: contain; position: absolute; 
            z-index: 4; image-rendering: pixelated; transform-origin: bottom center;
        }
        #kit1-sprite { bottom: -10px; left: -30px; }
        #kit2-sprite { bottom: 10px; right: -20px; }
        #kit3-sprite { bottom: -25px; left: 50px; z-index: 5; }
        .hidden { display: none !important; }

        /* --- ANIMATIONS --- */
        .anim-breathe { animation: breathe 3s infinite ease-in-out; }
        .anim-walk { animation: walk 0.5s infinite alternate ease-in-out; }
        .anim-groom { animation: groom 1s infinite alternate ease-in-out; }
        .anim-play { animation: bounce 0.4s infinite alternate ease-in-out; }
        .anim-cuddle { filter: drop-shadow(0 0 20px #ff6699); transform: scale(1.05); }
        .anim-sleep { filter: brightness(0.5); animation: breathe 4s infinite ease-in-out; }

        @keyframes breathe { 0%, 100% { transform: scale(1, 1); } 50% { transform: scale(1.03, 0.97); } }
        @keyframes walk { 0% { transform: translateY(0) rotate(-2deg); } 100% { transform: translateY(-10px) rotate(2deg); } }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-30px); } }
        @keyframes groom { 0% { transform: rotate(0deg) scale(1); } 100% { transform: rotate(-10deg) scaleY(0.9); } }

        /* --- HUD --- */
        #hud-top {
            position: absolute; top: 15px; left: 2%; width: 96%;
            display: flex; justify-content: space-between; align-items: center; z-index: 3; 
            font-size: 22px; padding: 10px 15px; box-sizing: border-box;
        }
        .stat-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .stat-item { color: #a8e6cf; display: flex; align-items: center; gap: 5px; }
        .stat-item span { color: #fff; }
        #age-display { color: #ffb199; font-size: 20px; }

        #reaction-text {
            position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%);
            text-align: center; padding: 10px 20px; z-index: 3; font-size: 24px; 
            color: #fff; transition: opacity 0.3s ease; pointer-events: none;
        }

        /* --- DRAG & DROP FOOD (PNGs) --- */
        #food-tray {
            position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; padding: 15px; z-index: 5;
            transition: opacity 0.3s, transform 0.3s;
        }
        .draggable-food {
            width: 60px; height: 60px; cursor: grab; padding: 5px;
            background: rgba(0, 0, 0, 0.4); border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.3); display: flex; justify-content: center; align-items: center;
        }
        .draggable-food img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        .flying-food {
            position: fixed; width: 60px; height: 60px; z-index: 9999;
            pointer-events: none; transform: translate(-50%, -50%); 
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6));
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        /* --- CONTROLS --- */
        #controls {
            position: absolute; bottom: 15px; left: 5%; width: 90%; z-index: 3;
            display: flex; gap: 10px; justify-content: center;
        }
        button {
            padding: 10px 20px; border: 2px solid rgba(255,255,255,0.4); border-radius: 8px;
            background: rgba(20, 20, 30, 0.8); color: #ffffff; cursor: pointer; 
            font-size: 20px; font-family: 'VT323', monospace; text-transform: uppercase; 
            backdrop-filter: blur(5px); transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5); display: flex; align-items: center; gap: 5px;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 rgba(0,0,0,0.5); }

        /* --- MODALS (Shop & Minigame) --- */
        .modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 10; justify-content: center; align-items: center;
        }
        .modal-content { padding: 30px; width: 500px; text-align: center; position: relative; }
        
        /* Shop Layout */
        .shop-items { display: flex; justify-content: space-around; margin-top: 20px; flex-wrap: wrap; }
        .shop-item {
            background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; border: 1px solid #555;
            cursor: pointer; width: 80px; transition: background 0.2s; margin-bottom: 10px;
        }
        .shop-item:hover { background: rgba(255,255,255,0.1); }
        .shop-item img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; }

        /* Minigame Area */
        #minigame-area {
            width: 100%; height: 250px; background: #222; border: 2px solid #555;
            position: relative; overflow: hidden; border-radius: 8px; cursor: crosshair;
        }
        .target-obj {
            width: 40px; height: 40px; background: #ff6699; border-radius: 50%;
            position: absolute; cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: #fff;
        }

        input {
            width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; 
            border: 2px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); 
            color: #fff; font-family: 'VT323', monospace; font-size: 22px; text-align: center;
        }
    </style>
</head>
<body>

<div id="landscape-lock">
    <div>📱</div>
    <div>Please rotate your device to landscape mode.</div>
</div>

<audio id="audio-bgm" src="bgm.mp3" loop></audio>
<audio id="audio-meow" src="meow.mp3"></audio>
<audio id="audio-eat" src="eat.mp3"></audio>
<audio id="audio-purr" src="purr.mp3"></audio>

<div id="game-container">
    <div id="bg-layer"></div>
    
    <div id="cat-group" onclick="petCat()">
        <img id="cat-sprite" class="main-sprite anim-breathe" src="cat.png" onerror="this.src='cat.png'">
        <img id="kit1-sprite" class="kitten-sprite hidden anim-breathe" src="kitten1.png" onerror="this.src='cat.png'">
        <img id="kit2-sprite" class="kitten-sprite hidden anim-breathe" src="kitten2.png" onerror="this.src='cat.png'">
        <img id="kit3-sprite" class="kitten-sprite hidden anim-breathe" src="kitten3.png" onerror="this.src='cat.png'">
    </div>

    <div id="hud-top" class="glass-panel">
        <div class="stat-group">
            <div class="stat-item">FOOD: <span id="stat-food">100</span></div>
            <div class="stat-item">ENERGY: <span id="stat-energy">100</span></div>
            <div class="stat-item">HAPPY: <span id="stat-happy">100</span></div>
            <div class="stat-item" style="color:#ffeaa7;">COINS: <span id="stat-coins">50</span></div>
        </div>
        <div id="age-display">Age: 1 Yr</div>
    </div>

    <div id="reaction-text" class="glass-panel">Waiting...</div>

    <div id="food-tray" class="glass-panel hidden"></div>

    <div id="controls">
        <button onclick="toggleFoodTray()">FEED</button>
        <button onclick="openMiniGame()">MINI-GAME</button>
        <button onclick="openShop()">SHOP</button>
        <button onclick="action('sleep')" id="btn-sleep">SLEEP</button>
        <button onclick="hardReset()" style="background: #e6737b;">RESET</button>
    </div>

    <div id="start-modal" class="modal" style="display: flex;">
        <div class="modal-content glass-panel">
            <h1 style="color:#a8e6cf; margin-top:0;">RAGDOLL LIFE</h1>
            <p>Landscape Edition</p>
            <input type="text" id="main-cat-name" placeholder="Name your cat...">
            <button style="width: 100%; justify-content: center; margin-top:10px;" onclick="startGame()">START</button>
        </div>
    </div>

    <div id="shop-modal" class="modal">
        <div class="modal-content glass-panel">
            <h2 style="margin-top:0;">SUPERMARKET</h2>
            <div style="color:#ffeaa7;">Coins: <span id="shop-coins"></span></div>
            <div class="shop-items" id="shop-items-container">
                </div>
            <button style="width: 100%; justify-content: center; margin-top:20px;" onclick="closeModal('shop-modal')">LEAVE</button>
        </div>
    </div>

    <div id="minigame-modal" class="modal">
        <div class="modal-content glass-panel">
            <h2 style="margin-top:0;">CATCH THE MOUSE</h2>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="color:#a8e6cf;">Score: <span id="mg-score">0</span></span>
                <span style="color:#ff8b94;">Time: <span id="mg-time">15</span>s</span>
            </div>
            <div id="minigame-area"></div>
            <button id="mg-start-btn" style="width: 100%; justify-content: center; margin-top:15px;" onclick="startMiniGame()">START GAME</button>
            <button style="width: 100%; justify-content: center; margin-top:10px; background:#444;" onclick="closeModal('minigame-modal')">CLOSE</button>
        </div>
    </div>

    <div id="kitten-modal" class="modal">
        <div class="modal-content glass-panel">
            <h2 style="color:#a8e6cf; margin-top:0;">KITTENS BORN!</h2>
            <input type="text" id="k1" placeholder="First Kitten">
            <input type="text" id="k2" placeholder="Second Kitten">
            <input type="text" id="k3" placeholder="Third Kitten">
            <button style="width: 100%; justify-content: center; margin-top:10px;" onclick="saveKittens()">SAVE FAMILY</button>
        </div>
    </div>
</div>

<script>
    // --- GAME STATE ---
    let gameState = {
        name: "Kitty", phase: 1, age: 1, 
        hunger: 100, energy: 100, happy: 100, coins: 50,
        isSleeping: false, startDate: null, lastPlayed: null,
        inventory: { fish: 2, croissant: 1, can: 1, milk: 0, mash: 0 },
        kittens: { k1: "Kit1", k2: "Kit2", k3: "Kit3" }
    };

    let behaviorInterval;
    let animationTimeout;
    const catGroup = document.getElementById('cat-group');
    const allSprites = [
        document.getElementById('cat-sprite'), document.getElementById('kit1-sprite'), 
        document.getElementById('kit2-sprite'), document.getElementById('kit3-sprite')
    ];

    // --- ITEM DATABASE (Using user PNGs) ---
    const itemsDB = {
        fish: { name: "Fresh Fish", img: "icon_fish.png", price: 10, hunger: 30 },
        croissant: { name: "Croissant", img: "icon_croissant.png", price: 15, hunger: 20 },
        can: { name: "Canned Food", img: "icon_can.png", price: 20, hunger: 25 },
        milk: { name: "Warm Milk", img: "icon_milk.png", price: 15, hunger: 20 },
        mash: { name: "Kitten Mash", img: "icon_mash.png", price: 25, hunger: 35 }
    };

    // --- INITIALIZATION ---
    function init() {
        let saved = localStorage.getItem('ragdoll_save_v6');
        if (saved) {
            gameState = JSON.parse(saved);
            document.querySelector('.opening-title').innerText = "WELCOME BACK";
            document.getElementById('main-cat-name').style.display = 'none'; 
            calculateTimeDrain();
        }
        setIdleState();
    }

    function startGame() {
        let nameInput = document.getElementById('main-cat-name');
        if (nameInput.style.display !== 'none' && nameInput.value.trim() !== "") {
            gameState.name = nameInput.value;
            gameState.startDate = Date.now();
        }
        gameState.lastPlayed = Date.now();
        document.getElementById('start-modal').style.display = 'none';
        
        let bgm = document.getElementById('audio-bgm');
        if(bgm) { bgm.volume = 0.3; bgm.play().catch(e => console.log(e)); }
        
        updateUI(); startFelineBrain();
        showReaction(`${gameState.name} entered the room.`);
    }

    // --- CORE LOGIC ---
    function calculateTimeDrain() {
        if (!gameState.lastPlayed || !gameState.startDate) return;
        let msPassed = Date.now() - gameState.lastPlayed;
        let hoursPassed = msPassed / (1000 * 60 * 60);
        
        if (hoursPassed > 1) {
            gameState.hunger = Math.max(0, Math.floor(gameState.hunger - (hoursPassed * 4)));
            gameState.happy = Math.max(0, Math.floor(gameState.happy - (hoursPassed * 2)));
            if (!gameState.isSleeping) gameState.energy = Math.max(0, Math.floor(gameState.energy - (hoursPassed * 3)));
        }
        
        // 4 Years per 24 hours
        let totalMs = Date.now() - gameState.startDate;
        let yearsPassed = Math.floor(totalMs / (1000 * 60 * 60 * 6));
        gameState.age = 1 + yearsPassed;
        checkLifeEvents();
    }

    function saveData() {
        gameState.lastPlayed = Date.now();
        localStorage.setItem('ragdoll_save_v6', JSON.stringify(gameState));
    }

    function playAudio(id) {
        let sound = document.getElementById(id);
        if (sound) { sound.currentTime = 0; sound.play().catch(e => console.log(e)); }
    }

    function triggerAnimation(animClass) {
        allSprites.forEach(sprite => {
            if (!sprite.classList.contains('hidden')) sprite.className = `${sprite.id === 'cat-sprite' ? 'main-sprite' : 'kitten-sprite'} ${animClass}`;
        });
        clearTimeout(animationTimeout);
        animationTimeout = setTimeout(() => { if (!gameState.isSleeping) setIdleState(); }, 2000);
    }

    // --- INTERACTION (Petting & Sleeping) ---
    function petCat() {
        if (gameState.isSleeping) return;
        gameState.happy = Math.min(100, gameState.happy + 5);
        showReaction(`You pet ${gameState.name}. Purrr...`);
        playAudio('audio-purr');
        triggerAnimation('anim-cuddle');
        saveData(); updateUI();
    }

    function action(type) {
        calculateTimeDrain();
        if (type === 'sleep') {
            gameState.isSleeping = !gameState.isSleeping;
            if (gameState.isSleeping) {
                showReaction("Falling asleep..."); 
                document.getElementById('btn-sleep').innerHTML = "WAKE UP";
                document.getElementById('bg-layer').style.filter = "brightness(0.2)";
                triggerAnimation('anim-sleep');
            } else {
                gameState.energy = Math.min(100, gameState.energy + 50);
                showReaction("Waking up!"); 
                document.getElementById('btn-sleep').innerHTML = "SLEEP";
                document.getElementById('bg-layer').style.filter = "brightness(1)";
                setIdleState();
            }
        }
        saveData(); updateUI();
    }

    // --- AUTONOMOUS BEHAVIOR (Roaming) ---
    function startFelineBrain() {
        clearInterval(behaviorInterval);
        behaviorInterval = setInterval(() => {
            if (gameState.isSleeping || document.getElementById('food-tray').classList.contains('hidden') === false) return;
            
            let chance = Math.random();
            if (chance < 0.4) {
                // Roam Left/Right
                let newX = 20 + Math.random() * 60; 
                let currentX = parseFloat(catGroup.style.left || 50);
                let flip = newX < currentX ? -1 : 1;
                
                catGroup.style.transform = `translate(-50%, -50%) scaleX(${flip})`;
                catGroup.style.left = newX + '%';
                triggerAnimation('anim-walk');
            } else if (chance < 0.6) {
                triggerAnimation('anim-groom');
            }
        }, 5000);
    }

    // --- INVENTORY & DRAG FEEDING ---
    let activeDrag = null;

    function toggleFoodTray() {
        if (gameState.isSleeping) return;
        let tray = document.getElementById('food-tray');
        tray.innerHTML = ""; 
        
        let hasFood = false;
        Object.keys(gameState.inventory).forEach(key => {
            if (gameState.inventory[key] > 0) {
                hasFood = true;
                let div = document.createElement('div');
                div.className = 'draggable-food';
                div.innerHTML = `<img src="${itemsDB[key].img}" onerror="this.style.display='none'"> <span style="position:absolute; bottom:2px; right:2px; font-size:14px; background:#000; padding:2px; border-radius:4px;">${gameState.inventory[key]}</span>`;
                div.onmousedown = (e) => startDrag(e, key);
                div.ontouchstart = (e) => startDrag(e, key);
                tray.appendChild(div);
            }
        });

        if (!hasFood) tray.innerHTML = "<div style='padding:10px;'>No food! Buy some in the Shop.</div>";
        tray.classList.toggle('hidden');
    }

    function startDrag(e, itemKey) {
        e.preventDefault(); 
        activeDrag = document.createElement('div');
        activeDrag.className = 'flying-food';
        activeDrag.style.backgroundImage = `url('${itemsDB[itemKey].img}')`;
        activeDrag.dataset.key = itemKey;
        document.body.appendChild(activeDrag);

        moveDrag(e); 
        document.addEventListener('mousemove', moveDrag);
        document.addEventListener('touchmove', moveDrag, {passive: false});
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
    }

    function moveDrag(e) {
        if(!activeDrag) return;
        e.preventDefault(); 
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        activeDrag.style.left = clientX + 'px';
        activeDrag.style.top = clientY + 'px';
    }

    function endDrag(e) {
        if(!activeDrag) return;
        let clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
        let clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
        let catRect = catGroup.getBoundingClientRect();
        
        if (clientX >= catRect.left && clientX <= catRect.right && clientY >= catRect.top && clientY <= catRect.bottom) {
            let key = activeDrag.dataset.key;
            gameState.inventory[key]--;
            gameState.hunger = Math.min(100, gameState.hunger + itemsDB[key].hunger);
            showReaction(`Eating ${itemsDB[key].name}...`);
            playAudio('audio-eat'); triggerAnimation('anim-eat'); 
            document.getElementById('food-tray').classList.add('hidden'); 
            saveData(); updateUI();
        }

        activeDrag.remove(); activeDrag = null;
        document.removeEventListener('mousemove', moveDrag);
        document.removeEventListener('touchmove', moveDrag);
        document.removeEventListener('mouseup', endDrag);
        document.removeEventListener('touchend', endDrag);
    }

    // --- SHOP SYSTEM ---
    function openShop() {
        if (gameState.isSleeping) return;
        document.getElementById('shop-coins').innerText = gameState.coins;
        let container = document.getElementById('shop-items-container');
        container.innerHTML = "";
        
        Object.keys(itemsDB).forEach(key => {
            let item = itemsDB[key];
            let div = document.createElement('div');
            div.className = 'shop-item';
            div.innerHTML = `<img src="${item.img}" onerror="this.style.display='none'"><div>${item.price}c</div>`;
            div.onclick = () => buyItem(key);
            container.appendChild(div);
        });
        document.getElementById('shop-modal').style.display = 'flex';
    }

    function buyItem(key) {
        let item = itemsDB[key];
        if (gameState.coins >= item.price) {
            gameState.coins -= item.price;
            gameState.inventory[key]++;
            document.getElementById('shop-coins').innerText = gameState.coins;
            saveData(); updateUI();
        } else {
            alert("Not enough coins! Play the mini-game.");
        }
    }

    // --- MINI-GAME (Catch the Mouse) ---
    let mgTimer, mgInterval;
    let mgTime = 15; let mgScore = 0;

    function openMiniGame() {
        if (gameState.isSleeping) return;
        document.getElementById('minigame-modal').style.display = 'flex';
        document.getElementById('mg-start-btn').style.display = 'block';
        document.getElementById('minigame-area').innerHTML = "";
    }

    function startMiniGame() {
        mgTime = 15; mgScore = 0;
        document.getElementById('mg-time').innerText = mgTime;
        document.getElementById('mg-score').innerText = mgScore;
        document.getElementById('mg-start-btn').style.display = 'none';
        
        clearInterval(mgInterval); clearInterval(mgTimer);
        document.getElementById('minigame-area').innerHTML = "";
        
        mgTimer = setInterval(() => {
            mgTime--; document.getElementById('mg-time').innerText = mgTime;
            if (mgTime <= 0) endMiniGame();
        }, 1000);
        
        spawnTarget();
    }

    function spawnTarget() {
        if (mgTime <= 0) return;
        let area = document.getElementById('minigame-area');
        area.innerHTML = "";
        let target = document.createElement('div');
        target.className = 'target-obj';
        target.innerText = "🐭"; // Mini-game target
        target.style.left = Math.random() * (area.clientWidth - 40) + 'px';
        target.style.top = Math.random() * (area.clientHeight - 40) + 'px';
        
        target.onmousedown = hitTarget;
        target.ontouchstart = hitTarget;
        area.appendChild(target);
        
        mgInterval = setTimeout(spawnTarget, 800 + Math.random() * 500);
    }

    function hitTarget(e) {
        e.preventDefault();
        mgScore++; document.getElementById('mg-score').innerText = mgScore;
        clearTimeout(mgInterval); spawnTarget();
    }

    function endMiniGame() {
        clearInterval(mgTimer); clearTimeout(mgInterval);
        document.getElementById('minigame-area').innerHTML = `<div style="color:#fff; margin-top:100px; font-size:24px;">Time's Up!<br>Earned: ${mgScore} Coins</div>`;
        document.getElementById('mg-start-btn').innerText = "PLAY AGAIN";
        document.getElementById('mg-start-btn').style.display = 'block';
        gameState.coins += mgScore;
        gameState.energy = Math.max(0, gameState.energy - 10);
        saveData(); updateUI();
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        if(id === 'minigame-modal') { clearInterval(mgTimer); clearTimeout(mgInterval); }
    }

    // --- LIFE EVENTS ---
    function checkLifeEvents() {
        if (gameState.phase === 4) return;
        if (gameState.age >= 16 && gameState.phase < 4) {
            document.getElementById('kitten-modal').style.display = 'flex';
        } else if (gameState.age >= 12 && gameState.phase < 3) {
            gameState.phase = 3; showReaction(`Marriage Day!`);
        } else if (gameState.age >= 8 && gameState.phase < 2) {
            gameState.phase = 2; showReaction(`Met Akira!`);
        }
    }

    function saveKittens() {
        gameState.kittens.k1 = document.getElementById('k1').value || "Kit1";
        gameState.kittens.k2 = document.getElementById('k2').value || "Kit2";
        gameState.kittens.k3 = document.getElementById('k3').value || "Kit3";
        gameState.phase = 4; document.getElementById('kitten-modal').style.display = 'none';
        showReaction("Welcome to the family!"); saveData(); setIdleState(); updateUI();
    }

    function updateUI() {
        document.getElementById('stat-food').innerText = gameState.hunger;
        document.getElementById('stat-energy').innerText = gameState.energy;
        document.getElementById('stat-happy').innerText = gameState.happy;
        document.getElementById('stat-coins').innerText = gameState.coins;
        let p = gameState.phase === 4 ? "Family" : "Adult";
        document.getElementById('age-display').innerText = `${p} Era: ${gameState.age} Yr`;
    }

    function showReaction(text) { 
        document.getElementById('reaction-text').innerText = text; 
    }

    function setIdleState() {
        if (gameState.phase >= 2) catSprite.src = 'akira.png';
        else catSprite.src = 'cat.png';
        
        if (gameState.phase === 4) {
            allSprites[1].classList.remove('hidden'); 
            allSprites[2].classList.remove('hidden'); 
            allSprites[3].classList.remove('hidden');
        }

        let anim = gameState.isSleeping ? 'anim-sleep' : 'anim-breathe';
        allSprites.forEach(sprite => {
            if (!sprite.classList.contains('hidden')) {
                sprite.className = `${sprite.id === 'cat-sprite' ? 'main-sprite' : 'kitten-sprite'} ${anim}`;
            }
        });
    }

    function hardReset() {
        if(confirm("Are you sure? This deletes ALL progress forever.")) {
            localStorage.removeItem('ragdoll_save_v6'); location.reload();
        }
    }

    window.onload = init;
</script>
</body>
</html>
