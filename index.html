<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragdoll Life Simulation</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #121212;
            color: #FFFFFF; font-family: Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; user-select: none;
        }
        #game-container {
            width: 100%; max-width: 400px; height: 100vh; max-height: 800px;
            background-color: #000000; position: relative;
            overflow: hidden; border: 1px solid #333;
        }
        #bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('my_room.jpg'); 
            background-size: cover; background-position: center; z-index: 1;
        }
        #sprite-layer {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px; z-index: 2;
        }
        #cat-sprite {
            width: 100%; height: 100%; object-fit: contain;
            image-rendering: pixelated;
        }
        #hud-top {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.7); padding: 15px; box-sizing: border-box;
            display: flex; justify-content: space-between; z-index: 3; font-weight: bold;
        }
        #reaction-text {
            position: absolute; bottom: 220px; left: 50%;
            transform: translateX(-50%); background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px; border-radius: 8px; text-align: center;
            width: 80%; z-index: 3;
        }
        #controls {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.8); padding: 10px; box-sizing: border-box; z-index: 3;
        }
        .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
        button {
            flex: 1; padding: 15px 5px; border: none; border-radius: 5px;
            font-weight: bold; color: #FFF; cursor: pointer; font-size: 14px;
        }
        button:active { filter: brightness(0.8); }
        .btn-feed { background-color: #4CAF50; }
        .btn-play { background-color: #2196F3; }
        .btn-sleep { background-color: #9C27B0; }
        .btn-cuddle { background-color: #E91E63; }
        .btn-skip { background-color: #607D8B; }
        .modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 10;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #212121; padding: 20px; border-radius: 10px;
            width: 80%; text-align: center;
        }
        .food-item {
            background: #333; padding: 15px; margin: 5px 0;
            border-radius: 5px; cursor: pointer;
        }
        input {
            width: 90%; padding: 10px; margin: 5px 0;
            border-radius: 5px; border: none; box-sizing: border-box;
        }
    </style>
</head>
<body>

<audio id="audio-bgm" src="bgm.mp3" loop></audio>
<audio id="audio-meow" src="meow.mp3"></audio>
<audio id="audio-eat" src="eat.mp3"></audio>
<audio id="audio-purr" src="purr.mp3"></audio>

<div id="game-container">
    <div id="bg-layer"></div>
    
    <div id="sprite-layer">
        <img id="cat-sprite" src="cat_idle.gif" alt="Cat Pixel Art">
    </div>

    <div id="hud-top">
        <span id="stats-display">Hunger: 100 | Energy: 100</span>
        <span id="age-display" style="color: #FFD700;">Day 1</span>
    </div>

    <div id="reaction-text">Waiting to start...</div>

    <div id="controls">
        <div class="btn-row">
            <button class="btn-feed" onclick="openFoodMenu()">FEED 🍖</button>
            <button class="btn-play" onclick="action('play')">PLAY 🧶</button>
            <button class="btn-sleep" onclick="action('sleep')" id="btn-sleep">SLEEP 💤</button>
        </div>
        <div class="btn-row">
            <button class="btn-cuddle" onclick="action('cuddle')">CUDDLE 🧡</button>
            <button class="btn-skip" onclick="skipDay()">+1 DAY ⏳</button>
        </div>
    </div>

    <div id="start-modal" class="modal" style="display: flex;">
        <div class="modal-content">
            <h3>Name Your Cat 🐾</h3>
            <input type="text" id="main-cat-name" placeholder="Enter name...">
            <button style="background: #4CAF50; margin-top: 15px;" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <div id="food-modal" class="modal">
        <div class="modal-content">
            <h3>Choose Food</h3>
            <div id="food-list"></div>
            <button style="background: #D32F2F; margin-top: 15px;" onclick="closeModal('food-modal')">Cancel</button>
        </div>
    </div>

    <div id="kitten-modal" class="modal">
        <div class="modal-content">
            <h3>3 Kittens Born! 🐾</h3>
            <input type="text" id="k1" placeholder="Kitten 1 Name">
            <input type="text" id="k2" placeholder="Kitten 2 Name">
            <input type="text" id="k3" placeholder="Kitten 3 Name">
            <button style="background: #4CAF50; margin-top: 15px;" onclick="saveKittens()">Save Family</button>
        </div>
    </div>
</div>

<script>
    let gameState = {
        mainCatName: "Kitty",
        phase: 1, 
        age: 1,
        hunger: 100,
        energy: 100,
        isSleeping: false,
        lastPlayed: Date.now(),
        kittens: { k1: "Kit1", k2: "Kit2", k3: "Kit3" }
    };

    let animationTimeout;

    function init() {
        let savedData = localStorage.getItem('ragdoll_data');
        if (savedData) {
            gameState = JSON.parse(savedData);
            document.getElementById('start-modal').style.display = 'none';
            startAudio();
            calculateOfflineDrain();
            updateUI();
            setIdleAnimation();
        }
    }

    function startGame() {
        let nameInput = document.getElementById('main-cat-name').value;
        if (nameInput.trim() !== "") {
            gameState.mainCatName = nameInput;
        }
        document.getElementById('start-modal').style.display = 'none';
        startAudio();
        saveData();
        updateUI();
        setIdleAnimation();
        showReaction(`${gameState.mainCatName} is exploring the room.`);
    }

    function startAudio() {
        let bgm = document.getElementById('audio-bgm');
        bgm.volume = 0.3;
        bgm.play().catch(() => console.log("Audio play blocked by browser until interaction."));
    }

    function playSound(id) {
        let sound = document.getElementById(id);
        if (sound) {
            sound.currentTime = 0;
            sound.play().catch(e => console.log(e));
        }
    }

    function saveData() {
        gameState.lastPlayed = Date.now();
        localStorage.setItem('ragdoll_data', JSON.stringify(gameState));
    }

    function calculateOfflineDrain() {
        let now = Date.now();
        let hoursPassed = (now - gameState.lastPlayed) / (1000 * 60 * 60);
        
        if (hoursPassed > 1) {
            gameState.hunger = Math.max(0, Math.floor(gameState.hunger - (hoursPassed * 5)));
            if (!gameState.isSleeping) {
                gameState.energy = Math.max(0, Math.floor(gameState.energy - (hoursPassed * 4)));
            }
        }
    }

    function action(type) {
        if (gameState.isSleeping && type !== 'sleep') {
            showReaction("Shh... resting.");
            return;
        }

        clearTimeout(animationTimeout);

        if (type === 'play') {
            gameState.energy = Math.max(0, gameState.energy - 15);
            showReaction(`${gameState.mainCatName} is chasing the toy! 🧶`);
            playSound('audio-meow');
            playAnimation('cat_play.gif', true);
        } 
        else if (type === 'cuddle') {
            if (gameState.phase === 2) {
                showReaction(`${gameState.mainCatName} is cuddling with Akira! 🧡`);
                playSound('audio-purr');
                playAnimation('meet_akira.gif', true);
            } else if (gameState.phase === 4) {
                showReaction(`The kittens pile up on ${gameState.mainCatName}.`);
                playSound('audio-purr');
                playAnimation('kitten_cuddle.gif', true);
            } else {
                showReaction(`${gameState.mainCatName} purrs happily. 🧡`);
                playSound('audio-purr');
                playAnimation('cat_cuddle.gif', true);
            }
        }
        else if (type === 'sleep') {
            gameState.isSleeping = !gameState.isSleeping;
            if (gameState.isSleeping) {
                showReaction(`${gameState.mainCatName} is falling asleep... 💤`);
                document.getElementById('btn-sleep').innerHTML = "WAKE ☀️";
                playAnimation('cat_sleep.gif', false);
            } else {
                gameState.energy = Math.min(100, gameState.energy + 40);
                showReaction(`${gameState.mainCatName} is waking up! ☀️`);
                document.getElementById('btn-sleep').innerHTML = "SLEEP 💤";
                setIdleAnimation();
            }
        }

        saveData();
        updateUI();
    }

    function feedCat(foodName, hungerValue) {
        gameState.hunger = Math.min(100, gameState.hunger + hungerValue);
        showReaction(`${gameState.mainCatName} is eating ${foodName}... 🍖`);
        playSound('audio-eat');
        playAnimation('cat_eat.gif', true);
        closeModal('food-modal');
        saveData();
        updateUI();
    }

    function skipDay() {
        gameState.age++;
        checkLifeEvents();
        saveData();
        updateUI();
    }

    function checkLifeEvents() {
        if (gameState.phase === 4) {
            showReaction(`Raising ${gameState.kittens.k1}, ${gameState.kittens.k2}, & ${gameState.kittens.k3}.`);
            setIdleAnimation();
            return;
        }

        if (gameState.age === 8) {
            gameState.phase = 2;
            showReaction(`${gameState.mainCatName} met an orange Persian named Akira! 🧡`);
        } else if (gameState.age === 12) {
            gameState.phase = 3;
            showReaction(`💍 Marriage Day for ${gameState.mainCatName} and Akira!`);
        } else if (gameState.age === 16) {
            document.getElementById('kitten-modal').style.display = 'flex';
        } else {
            showReaction("A day has passed.");
        }
        setIdleAnimation();
    }

    function saveKittens() {
        gameState.kittens.k1 = document.getElementById('k1').value || "Kit1";
        gameState.kittens.k2 = document.getElementById('k2').value || "Kit2";
        gameState.kittens.k3 = document.getElementById('k3').value || "Kit3";
        gameState.phase = 4;
        
        closeModal('kitten-modal');
        showReaction("Welcome to the family!");
        saveData();
        setIdleAnimation();
        updateUI();
    }

    function updateUI() {
        document.getElementById('stats-display').innerText = `Hunger: ${gameState.hunger} | Energy: ${gameState.energy}`;
        let prefix = (gameState.phase === 4) ? "Family Era - " : "Adult Era - ";
        document.getElementById('age-display').innerText = prefix + "Day " + gameState.age;
    }

    function showReaction(text) {
        document.getElementById('reaction-text').innerText = text;
    }

    function playAnimation(gifName, revertToIdle) {
        document.getElementById('cat-sprite').src = gifName;
        if (revertToIdle) {
            animationTimeout = setTimeout(() => {
                if (!gameState.isSleeping) setIdleAnimation();
            }, 3000);
        }
    }

    function setIdleAnimation() {
        if (gameState.isSleeping) {
            playAnimation('cat_sleep.gif', false);
        } else if (gameState.phase === 4) {
            playAnimation('family_idle.gif', false); 
        } else if (gameState.phase === 3) {
            playAnimation('cats_wedding.gif', false);
        } else if (gameState.phase === 2) {
            playAnimation('akira_idle.gif', false);
        } else {
            playAnimation('cat_idle.gif', false);
        }
    }

    function openFoodMenu() {
        if (gameState.isSleeping) { showReaction("Wake her up first."); return; }
        
        let foodList = document.getElementById('food-list');
        foodList.innerHTML = "";
        
        let foods = (gameState.phase === 4) 
            ? [{n: "Warm Milk 🍼", v: 20}, {n: "Kitten Mash 🥣", v: 25}]
            : [{n: "Fresh Fish 🐟", v: 30}, {n: "Chicken Bone 🍗", v: 20}, {n: "Canned Food 🥫", v: 25}, {n: "Dry Kibble 🧆", v: 15}];

        foods.forEach(f => {
            let div = document.createElement('div');
            div.className = 'food-item';
            div.innerText = f.n;
            div.onclick = () => feedCat(f.n, f.v);
            foodList.appendChild(div);
        });

        document.getElementById('food-modal').style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    window.onload = init;
</script>
</body>
</html>
