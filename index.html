<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragdoll Life Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background-color: #ffb6c1; color: #ff3385;
            font-family: 'VT323', monospace; display: flex; justify-content: center; align-items: center;
            height: 100vh; user-select: none; overflow: hidden; touch-action: none; font-size: 22px;
        }
        #game-container {
            width: 100%; max-width: 450px; height: 100vh; max-height: 850px;
            background-color: #1a1a24; position: relative; overflow: hidden; 
            border: 4px solid #ff99cc; box-sizing: border-box;
        }
        
        #bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('my_room.jpg'); 
            background-size: cover; background-position: center; z-index: 1;
            transition: filter 1s ease;
        }

        .cute-panel {
            background: rgba(255, 255, 255, 0.85); border: 4px solid #ff99cc;
            border-radius: 16px; box-shadow: 0 4px 0 #ff99cc; color: #ff3385;
        }

        #sprite-layer {
            position: absolute; top: 50%; left: 50%; width: 220px; height: 220px; 
            z-index: 2; transform: translate(-50%, -40%);
        }
        .main-sprite {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; z-index: 3; image-rendering: pixelated;
            transition: filter 0.5s ease, transform 0.3s ease;
        }
        .kitten-sprite {
            width: 80px; height: 80px; object-fit: contain;
            position: absolute; z-index: 4; image-rendering: pixelated;
        }
        #kit1-sprite { bottom: -10px; left: -40px; }
        #kit2-sprite { bottom: 10px; right: -30px; }
        #kit3-sprite { bottom: -25px; left: 60px; z-index: 5; }
        .hidden { display: none !important; }

        .anim-play { animation: bounce 0.4s infinite alternate ease-in-out; }
        .anim-cuddle { filter: drop-shadow(0 0 15px #ff6699); transform: scale(1.05); }
        .anim-eat { animation: bounce 0.2s infinite alternate ease-in-out; }
        .anim-sleep { filter: brightness(0.4); }

        @keyframes bounce { 
            0% { transform: translateY(0); } 
            100% { transform: translateY(-30px); } 
        }

        #hud-top {
            position: absolute; top: 15px; left: 5%; width: 90%;
            display: flex; flex-direction: column; align-items: center; z-index: 3; 
            font-size: 26px; font-weight: bold; text-align: center;
            text-shadow: 2px 2px 0px #fff;
        }
        #age-display { font-size: 20px; color: #ff66a3; }

        #reaction-text {
            position: absolute; bottom: 250px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 90%; z-index: 3; font-size: 26px; color: #ff3385;
            text-shadow: 2px 2px 0 #fff; transition: all 0.3s ease;
        }

        #food-tray {
            position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; padding: 10px 20px; z-index: 5;
            background: rgba(255, 255, 255, 0.9); border-radius: 16px;
            border: 4px solid #ff99cc; box-shadow: 0 4px 0 #ff99cc;
            transition: opacity 0.3s, transform 0.3s;
        }
        .draggable-food {
            width: 55px; height: 55px; cursor: grab; padding: 5px;
            background: rgba(255, 182, 193, 0.4); border-radius: 12px;
            border: 2px solid #ff99cc; display: flex; justify-content: center; align-items: center;
        }
        .draggable-food img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .draggable-food:active { cursor: grabbing; transform: scale(0.9); }
        
        .flying-food {
            position: fixed; width: 70px; height: 70px; z-index: 9999;
            pointer-events: none; transform: translate(-50%, -50%); 
            background-size: contain; background-repeat: no-repeat; background-position: center;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4));
        }

        #controls {
            position: absolute; bottom: 15px; left: 5%; width: 90%; z-index: 3;
        }
        .btn-row { display: flex; gap: 8px; margin-bottom: 8px; justify-content: center; }
        button {
            flex: 1; padding: 12px 5px; border: 3px solid #ff99cc; border-radius: 12px;
            background-color: #ffb6c1; color: #ffffff; cursor: pointer; 
            font-size: 24px; font-family: 'VT323', monospace; text-transform: uppercase; 
            box-shadow: 0 4px 0 #ff99cc; transition: transform 0.1s, box-shadow 0.1s;
            text-shadow: 2px 2px 0px #ff66a3;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #ff99cc; }
        
        .btn-action { background-color: #a8e6cf; border-color: #88d4b4; box-shadow: 0 4px 0 #88d4b4; text-shadow: 2px 2px 0 #6ebf9f; }
        .btn-danger { background-color: #ff8b94; border-color: #e6737b; box-shadow: 0 4px 0 #e6737b; }

        .modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 230, 240, 0.95); z-index: 10; justify-content: center; align-items: center;
        }
        .modal-content { padding: 30px; width: 85%; text-align: center; box-sizing: border-box; }
        .opening-title { font-size: 48px; margin-bottom: 5px; color: #ff3385; text-shadow: 2px 2px 0 #ffb6c1; }
        .opening-subtitle { font-size: 22px; margin-bottom: 25px; color: #ff66a3; }
        
        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; 
            border: 3px solid #ff99cc; background: #ffffff; 
            color: #ff3385; font-family: 'VT323', monospace; font-size: 24px;
            text-align: center; box-sizing: border-box; outline: none;
        }
    </style>
</head>
<body>

<audio id="audio-bgm" src="bgm.mp3" loop></audio>
<audio id="audio-meow" src="meow.mp3"></audio>
<audio id="audio-eat" src="eat.mp3"></audio>

<div id="game-container">
    <div id="bg-layer"></div>
    
    <div id="sprite-layer">
        <img id="cat-sprite" class="main-sprite" src="cat.png" onerror="this.src='cat.png'">
        
        <img id="kit1-sprite" class="kitten-sprite hidden" src="kitten1.png" onerror="this.src='cat.png'">
        <img id="kit2-sprite" class="kitten-sprite hidden" src="kitten2.png" onerror="this.src='cat.png'">
        <img id="kit3-sprite" class="kitten-sprite hidden" src="kitten3.png" onerror="this.src='cat.png'">
    </div>

    <div id="hud-top">
        <div>Food: <span id="stat-food">100</span> | Energy: <span id="stat-energy">100</span></div>
        <div id="age-display">Adult Era - Day 1</div>
    </div>

    <div id="reaction-text">Waiting...</div>

    <div id="food-tray" class="hidden"></div>

    <div id="controls">
        <div class="btn-row">
            <button onclick="toggleFoodTray()">FEED 🍽️</button>
            <button class="btn-action" onclick="action('play')">PLAY 🧶</button>
            <button class="btn-action" onclick="action('cuddle')">CUDDLE 💖</button>
        </div>
        <div class="btn-row">
            <button onclick="action('sleep')" id="btn-sleep">SLEEP 💤</button>
            <button class="btn-danger" onclick="hardReset()">RESET ⚠️</button>
        </div>
    </div>

    <div id="start-modal" class="modal" style="display: flex;">
        <div class="modal-content cute-panel">
            <div class="opening-title">RAGDOLL LIFE</div>
            <div class="opening-subtitle">Virtual Pet Sim ✨</div>
            <input type="text" id="main-cat-name" placeholder="Name your cat...">
            <button style="width: 100%; margin-top: 15px;" class="btn-action" onclick="startGame()">START</button>
        </div>
    </div>

    <div id="kitten-modal" class="modal">
        <div class="modal-content cute-panel">
            <h3 style="margin-top:0; color:#ff3385; font-size:36px;">KITTENS BORN!</h3>
            <input type="text" id="k1" placeholder="First Kitten">
            <input type="text" id="k2" placeholder="Second Kitten">
            <input type="text" id="k3" placeholder="Third Kitten">
            <button style="width: 100%; margin-top: 15px;" class="btn-action" onclick="saveKittens()">SAVE FAMILY</button>
        </div>
    </div>
</div>

<script>
    let gameState = {
        name: "Kitty", phase: 1, age: 1, hunger: 100, energy: 100,
        isSleeping: false, startDate: null, lastPlayed: null,
        kittens: { k1: "Kit1", k2: "Kit2", k3: "Kit3" }
    };

    let animationTimeout;
    const catSprite = document.getElementById('cat-sprite');
    const kitten1 = document.getElementById('kit1-sprite');
    const kitten2 = document.getElementById('kit2-sprite');
    const kitten3 = document.getElementById('kit3-sprite');
    const allSprites = [catSprite, kitten1, kitten2, kitten3];

    let activeDrag = null;

    function startDrag(e, foodName, hungerValue, imgSrc) {
        if (gameState.isSleeping) return;
        e.preventDefault(); 
        
        activeDrag = document.createElement('div');
        activeDrag.className = 'flying-food';
        activeDrag.style.backgroundImage = "url('" + imgSrc + "')";
        activeDrag.dataset.name = foodName;
        activeDrag.dataset.value = hungerValue;
        document.body.appendChild(activeDrag);

        moveDrag(e); 
        document.addEventListener('mousemove', moveDrag);
        document.addEventListener('touchmove', moveDrag, {passive: false});
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
    }

    function moveDrag(e) {
        if(!activeDrag) return;
        e.preventDefault(); 
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        activeDrag.style.left = clientX + 'px';
        activeDrag.style.top = clientY + 'px';
    }

    function endDrag(e) {
        if(!activeDrag) return;
        let clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
        let clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
        let catRect = document.getElementById('sprite-layer').getBoundingClientRect();
        
        if (clientX >= catRect.left && clientX <= catRect.right && clientY >= catRect.top && clientY <= catRect.bottom) {
            feedCat(activeDrag.dataset.name, parseInt(activeDrag.dataset.value));
        }

        activeDrag.remove(); activeDrag = null;
        document.removeEventListener('mousemove', moveDrag);
        document.removeEventListener('touchmove', moveDrag);
        document.removeEventListener('mouseup', endDrag);
        document.removeEventListener('touchend', endDrag);
    }

    function toggleFoodTray() {
        if (gameState.isSleeping) { showReaction("Wake her up first."); return; }
        let tray = document.getElementById('food-tray');
        tray.innerHTML = ""; 
        
        let foods = (gameState.phase === 4) 
            ? [{n: "Warm Milk", v: 20, src: "icon_milk.png"}, {n: "Kitten Mash", v: 25, src: "icon_mash.png"}]
            : [{n: "Fish", v: 30, src: "icon_fish.png"}, {n: "Croissant", v: 20, src: "icon_croissant.png"}, {n: "Can", v: 25, src: "icon_can.png"}];

        foods.forEach(f => {
            let div = document.createElement('div');
            div.className = 'draggable-food';
            let img = document.createElement('img');
            img.src = f.src;
            img.onerror = function() { this.style.display='none'; };
            div.appendChild(img);
            div.onmousedown = (e) => startDrag(e, f.n, f.v, f.src);
            div.ontouchstart = (e) => startDrag(e, f.n, f.v, f.src);
            tray.appendChild(div);
        });
        tray.classList.toggle('hidden');
    }

    function init() {
        let saved = localStorage.getItem('ragdoll_save_v4');
        if (saved) {
            gameState = JSON.parse(saved);
            document.querySelector('.opening-title').innerText = "WELCOME BACK";
            document.getElementById('main-cat-name').style.display = 'none'; 
            calculateTimeDrain();
        }
        setIdleState();
    }

    function startGame() {
        let nameInput = document.getElementById('main-cat-name');
        if (nameInput.style.display !== 'none' && nameInput.value.trim() !== "") {
            gameState.name = nameInput.value;
            gameState.startDate = Date.now();
        }
        gameState.lastPlayed = Date.now();
        document.getElementById('start-modal').style.display = 'none';
        
        let bgm = document.getElementById('audio-bgm');
        if(bgm) { bgm.volume = 0.4; bgm.play().catch(e => console.log(e)); }
        
        updateUI(); showReaction(`${gameState.name} is exploring.`);
    }

    function hardReset() {
        if(confirm("Are you sure? This deletes ALL progress forever.")) {
            localStorage.removeItem('ragdoll_save_v4');
            location.reload();
        }
    }

    function calculateTimeDrain() {
        if (!gameState.lastPlayed) return;
        let msPassed = Date.now() - gameState.lastPlayed;
        let hoursPassed = msPassed / (1000 * 60 * 60);
        
        if (hoursPassed > 1) {
            gameState.hunger = Math.max(0, Math.floor(gameState.hunger - (hoursPassed * 4)));
            if (!gameState.isSleeping) gameState.energy = Math.max(0, Math.floor(gameState.energy - (hoursPassed * 3)));
        }
        
        if (gameState.startDate) {
            let totalDays = Math.floor((Date.now() - gameState.startDate) / (1000 * 60 * 60 * 24)) + 1;
            if (totalDays > gameState.age) gameState.age = totalDays;
        }
        checkLifeEvents();
    }

    function saveData() {
        gameState.lastPlayed = Date.now();
        localStorage.setItem('ragdoll_save_v4', JSON.stringify(gameState));
    }

    function playAudio(id) {
        let sound = document.getElementById(id);
        if (sound) { sound.currentTime = 0; sound.play().catch(e => console.log(e)); }
    }

    function triggerAnimation(animationClass) {
        allSprites.forEach(sprite => {
            if (!sprite.classList.contains('hidden')) {
                sprite.className = `kitten-sprite ${animationClass}`;
                if (sprite.id === 'cat-sprite') sprite.className = `main-sprite ${animationClass}`;
            }
        });
        clearTimeout(animationTimeout);
        animationTimeout = setTimeout(() => {
            if (!gameState.isSleeping) setIdleState();
        }, 2000);
    }

    function feedCat(foodName, hungerValue) {
        gameState.hunger = Math.min(100, gameState.hunger + hungerValue);
        showReaction(`Eating ${foodName}...`);
        playAudio('audio-eat');
        triggerAnimation('anim-eat'); 
        document.getElementById('food-tray').classList.add('hidden'); 
        saveData(); updateUI();
    }

    function action(type) {
        if (gameState.isSleeping && type !== 'sleep') { showReaction("Shh... sleeping."); return; }
        calculateTimeDrain();

        if (type === 'play') {
            if (gameState.energy < 15) { showReaction("Too tired to play."); return; }
            gameState.energy -= 15;
            showReaction("Playing! 🧶"); playAudio('audio-meow'); triggerAnimation('anim-play');
        } else if (type === 'cuddle') {
            showReaction("Purring happily. 💖"); triggerAnimation('anim-cuddle');
        } else if (type === 'sleep') {
            gameState.isSleeping = !gameState.isSleeping;
            if (gameState.isSleeping) {
                showReaction("Falling asleep... 💤"); document.getElementById('btn-sleep').innerHTML = "WAKE";
                document.getElementById('bg-layer').style.filter = "brightness(0.3)";
                triggerAnimation('anim-sleep');
            } else {
                gameState.energy = Math.min(100, gameState.energy + 50);
                showReaction("Waking up! ☀️"); document.getElementById('btn-sleep').innerHTML = "SLEEP 💤";
                document.getElementById('bg-layer').style.filter = "brightness(1)";
                setIdleState();
            }
        }
        saveData(); updateUI();
    }

    function checkLifeEvents() {
        if (gameState.phase === 4) return;
        if (gameState.age >= 16 && gameState.phase < 4) {
            document.getElementById('kitten-modal').style.display = 'flex';
        } else if (gameState.age >= 12 && gameState.phase < 3) {
            gameState.phase = 3; showReaction(`Marriage Day! 💍`);
        } else if (gameState.age >= 8 && gameState.phase < 2) {
            gameState.phase = 2; showReaction(`Met Akira! 🧡`);
        }
    }

    function saveKittens() {
        gameState.kittens.k1 = document.getElementById('k1').value || "Kit1";
        gameState.kittens.k2 = document.getElementById('k2').value || "Kit2";
        gameState.kittens.k3 = document.getElementById('k3').value || "Kit3";
        gameState.phase = 4; document.getElementById('kitten-modal').style.display = 'none';
        showReaction("Welcome to the family!"); saveData(); setIdleState(); updateUI();
    }

    function updateUI() {
        document.getElementById('stat-food').innerText = gameState.hunger;
        document.getElementById('stat-energy').innerText = gameState.energy;
        let p = gameState.phase === 4 ? "Family" : "Adult";
        document.getElementById('age-display').innerText = `${p} Era - Day ${gameState.age}`;
    }
    function showReaction(text) { document.getElementById('reaction-text').innerText = text; }

    function setIdleState() {
        if (gameState.phase >= 2) catSprite.src = 'akira.png';
        else catSprite.src = 'cat.png';
        
        if (gameState.phase === 4) {
            kitten1.classList.remove('hidden'); kitten2.classList.remove('hidden'); kitten3.classList.remove('hidden');
        }

        let anim = gameState.isSleeping ? 'anim-sleep' : '';
        allSprites.forEach(sprite => {
            if (!sprite.classList.contains('hidden')) {
                sprite.className = `kitten-sprite ${anim}`;
                if (sprite.id === 'cat-sprite') sprite.className = `main-sprite ${anim}`;
            }
        });
    }

    window.onload = init;
</script>
</body>
</html>
