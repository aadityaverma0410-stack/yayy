<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragdoll Life Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* --- FULL SCREEN LANDSCAPE SETUP --- */
        body {
            margin: 0; padding: 0; background-color: #0f0f15;
            font-family: 'VT323', monospace; display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; user-select: none; overflow: hidden; touch-action: none;
        }
        #game-container {
            width: 100vw; height: 100vh; /* Forces full screen */
            position: relative; overflow: hidden; 
        }
        
        #bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('my_room.jpg'); 
            background-size: cover; background-position: center; z-index: 1;
            transition: filter 1.5s ease;
        }

        /* --- UI STYLING (NO EMOJIS) --- */
        .glass-panel {
            background: rgba(15, 15, 25, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.15); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); color: #fff; text-shadow: 1px 1px 0 #000;
        }

        .svg-icon {
            width: 24px; height: 24px; vertical-align: middle; margin-right: 8px;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.5));
        }

        /* --- DYNAMIC SPRITE LAYER --- */
        #cat-group {
            position: absolute; top: 60%; left: 50%; width: 200px; height: 200px; 
            z-index: 2; transform: translate(-50%, -50%);
            /* Smooth transitions for roaming around */
            transition: left 3s ease-in-out, transform 0.3s ease;
            will-change: left, transform;
        }
        .main-sprite {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; z-index: 3; image-rendering: pixelated;
            transform-origin: bottom center; transition: filter 0.5s ease;
        }
        .kitten-sprite {
            width: 70px; height: 70px; object-fit: contain; position: absolute; 
            z-index: 4; image-rendering: pixelated; transform-origin: bottom center;
        }
        #kit1-sprite { bottom: -10px; left: -30px; }
        #kit2-sprite { bottom: 10px; right: -20px; }
        #kit3-sprite { bottom: -25px; left: 50px; z-index: 5; }
        .hidden { display: none !important; }

        /* --- REAL CAT BEHAVIOR ANIMATIONS --- */
        .anim-breathe { animation: breathe 3s infinite ease-in-out; }
        .anim-groom { animation: groom 1s infinite alternate ease-in-out; }
        .anim-stretch { animation: stretch 2.5s ease-in-out; }
        .anim-play { animation: bounce 0.4s infinite alternate ease-in-out; }
        .anim-cuddle { filter: drop-shadow(0 0 20px #ff6699); transform: scale(1.05); }
        .anim-eat { animation: tilt 0.3s infinite alternate ease-in-out; }
        .anim-sleep { filter: brightness(0.5); animation: breathe 4s infinite ease-in-out; }

        @keyframes breathe { 0%, 100% { transform: scale(1, 1); } 50% { transform: scale(1.02, 0.98); } }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-30px) scale(0.95, 1.05); } }
        @keyframes tilt { 0% { transform: rotate(-5deg); } 100% { transform: rotate(5deg); } }
        @keyframes groom { 0% { transform: rotate(0deg) scale(1); } 100% { transform: rotate(-15deg) scaleY(0.9); } }
        @keyframes stretch { 
            0%, 100% { transform: scale(1, 1); } 
            50% { transform: scale(1.3, 0.7) translateY(20px); } 
        }

        /* --- HUD --- */
        #hud-top {
            position: absolute; top: 20px; left: 5%; width: 90%;
            display: flex; justify-content: space-between; align-items: center; z-index: 3; 
            font-size: 24px; font-weight: bold; padding: 10px 20px; box-sizing: border-box;
        }
        .stat-group { display: flex; gap: 20px; align-items: center; }
        .stat-item { display: flex; align-items: center; }
        #age-display { font-size: 22px; color: #ffb199; }

        #reaction-text {
            position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%);
            text-align: center; padding: 12px 25px; z-index: 3; font-size: 24px; 
            color: #fff; transition: opacity 0.3s ease;
        }

        /* --- FOOD TRAY & DRAG --- */
        #food-tray {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; padding: 15px 25px; z-index: 5;
            transition: opacity 0.3s, transform 0.3s;
        }
        .draggable-food {
            width: 50px; height: 50px; cursor: grab; padding: 10px;
            background: rgba(255, 255, 255, 0.1); border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3); display: flex; justify-content: center; align-items: center;
            transition: background 0.2s, transform 0.2s;
        }
        .draggable-food:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); }
        .draggable-food:active { cursor: grabbing; transform: scale(0.9); }
        
        .flying-food {
            position: fixed; width: 60px; height: 60px; z-index: 9999;
            pointer-events: none; transform: translate(-50%, -50%); 
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6));
        }

        /* --- CONTROLS --- */
        #controls {
            position: absolute; bottom: 20px; left: 5%; width: 90%; z-index: 3;
            display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;
        }
        button {
            padding: 12px 25px; border: 2px solid rgba(255,255,255,0.4); border-radius: 8px;
            background: rgba(20, 20, 30, 0.8); color: #ffffff; cursor: pointer; 
            font-size: 22px; font-family: 'VT323', monospace; text-transform: uppercase; 
            backdrop-filter: blur(5px); transition: transform 0.1s, background 0.2s;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 0 rgba(0,0,0,0.5);
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 rgba(0,0,0,0.5); background: rgba(255,255,255,0.2); }

        .modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 10; justify-content: center; align-items: center;
        }
        .modal-content { padding: 40px; width: 400px; text-align: center; }
        .opening-title { font-size: 52px; margin-bottom: 5px; color: #a8e6cf; letter-spacing: 2px; }
        .opening-subtitle { font-size: 20px; margin-bottom: 30px; color: #ccc; }
        
        input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; 
            border: 2px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); 
            color: #fff; font-family: 'VT323', monospace; font-size: 24px;
            text-align: center; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: #a8e6cf; }
    </style>
</head>
<body>

<audio id="audio-bgm" src="bgm.mp3" loop></audio>
<audio id="audio-meow" src="meow.mp3"></audio>
<audio id="audio-eat" src="eat.mp3"></audio>

<div id="game-container">
    <div id="bg-layer"></div>
    
    <div id="cat-group">
        <img id="cat-sprite" class="main-sprite anim-breathe" src="cat.png" onerror="this.src='cat.png'">
        <img id="kit1-sprite" class="kitten-sprite hidden anim-breathe" src="kitten1.png" onerror="this.src='cat.png'">
        <img id="kit2-sprite" class="kitten-sprite hidden anim-breathe" src="kitten2.png" onerror="this.src='cat.png'">
        <img id="kit3-sprite" class="kitten-sprite hidden anim-breathe" src="kitten3.png" onerror="this.src='cat.png'">
    </div>

    <div id="hud-top" class="glass-panel">
        <div class="stat-group">
            <div class="stat-item">
                <svg class="svg-icon" viewBox="0 0 24 24" fill="#ffb199"><path d="M18.8 4.2c-1.2-1.2-3.1-1.2-4.2 0l-1.4 1.4-7.8-7.8c-1.2-1.2-3.1-1.2-4.2 0-1.2 1.2-1.2 3.1 0 4.2l7.8 7.8-1.4 1.4c-1.2 1.2-1.2 3.1 0 4.2 1.2 1.2 3.1 1.2 4.2 0l10.6-10.6c1.2-1.1 1.2-3 0-4.2z"/></svg>
                <span id="stat-food">100</span>
            </div>
            <div class="stat-item">
                <svg class="svg-icon" viewBox="0 0 24 24" fill="#ffeaa7"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <span id="stat-energy">100</span>
            </div>
        </div>
        <div id="age-display">Age: 1 Year</div>
    </div>

    <div id="reaction-text" class="glass-panel">Waiting...</div>

    <div id="food-tray" class="glass-panel hidden"></div>

    <div id="controls">
        <button onclick="toggleFoodTray()">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="#a8e6cf"><path d="M12 2C6.48 2 2 4.24 2 7v10c0 2.76 4.48 5 10 5s10-2.24 10-5V7c0-2.76-4.48-5-10-5zm0 18c-4.42 0-8-1.79-8-4v-2.22C5.64 15.15 8.65 16 12 16s6.36-.85 8-2.22V16c0 2.21-3.58 4-8 4z"/></svg>
            Feed
        </button>
        <button onclick="action('play')">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="#74b9ff"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 00-10 10M22 12a10 10 0 00-10-10" stroke="#fff" stroke-width="2" fill="none"/></svg>
            Play
        </button>
        <button onclick="action('cuddle')">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="#ff6699"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            Cuddle
        </button>
        <button onclick="action('sleep')" id="btn-sleep">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="#a29bfe"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
            Sleep
        </button>
    </div>

    <div id="start-modal" class="modal" style="display: flex;">
        <div class="modal-content glass-panel">
            <div class="opening-title">RAGDOLL LIFE</div>
            <div class="opening-subtitle">Virtual Pet Simulation</div>
            <input type="text" id="main-cat-name" placeholder="Name your cat...">
            <button style="width: 100%; margin-top: 15px; justify-content: center;" onclick="startGame()">Start Life</button>
        </div>
    </div>

    <div id="kitten-modal" class="modal">
        <div class="modal-content glass-panel">
            <h3 style="margin-top:0; color:#a8e6cf; font-size:40px;">KITTENS BORN!</h3>
            <input type="text" id="k1" placeholder="First Kitten">
            <input type="text" id="k2" placeholder="Second Kitten">
            <input type="text" id="k3" placeholder="Third Kitten">
            <button style="width: 100%; margin-top: 15px; justify-content: center;" onclick="saveKittens()">Save Family</button>
        </div>
    </div>
</div>

<script>
    let gameState = {
        name: "Kitty", phase: 1, age: 1, hunger: 100, energy: 100,
        isSleeping: false, startDate: null, lastPlayed: null,
        kittens: { k1: "Kit1", k2: "Kit2", k3: "Kit3" }
    };

    let animationTimeout;
    let behaviorInterval;
    const catGroup = document.getElementById('cat-group');
    const catSprite = document.getElementById('cat-sprite');
    const allSprites = [catSprite, document.getElementById('kit1-sprite'), document.getElementById('kit2-sprite'), document.getElementById('kit3-sprite')];

    // --- SVG CODE ELEMENTS FOR DRAG & DROP FOOD ---
    const svgFood = {
        fish: `<svg viewBox="0 0 24 24" fill="#a8e6cf"><path d="M22 12l-6-6v4c-6 0-10 4-12 8 2-2 6-3 12-3v4l6-6z"/></svg>`,
        can: `<svg viewBox="0 0 24 24" fill="#ffb6c1"><path d="M12 2C6.48 2 2 4.24 2 7v10c0 2.76 4.48 5 10 5s10-2.24 10-5V7c0-2.76-4.48-5-10-5zm0 18c-4.42 0-8-1.79-8-4v-2.22C5.64 15.15 8.65 16 12 16s6.36-.85 8-2.22V16c0 2.21-3.58 4-8 4zm0-6c-4.42 0-8-1.79-8-4s3.58-4 8-4 8 1.79 8 4-3.58 4-8 4z"/></svg>`,
        milk: `<svg viewBox="0 0 24 24" fill="#dfe6e9"><path d="M7 2v3h1v2.52c-2.31 1.25-4 3.73-4 6.48V20c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-6c0-2.75-1.69-5.23-4-6.48V5h1V2H7zm5 11c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>`
    };

    let activeDrag = null;

    function startDrag(e, foodName, hungerValue, svgCode) {
        if (gameState.isSleeping) return;
        e.preventDefault(); 
        
        activeDrag = document.createElement('div');
        activeDrag.className = 'flying-food';
        activeDrag.innerHTML = svgCode; // Uses pure SVG code element!
        activeDrag.dataset.name = foodName;
        activeDrag.dataset.value = hungerValue;
        document.body.appendChild(activeDrag);

        moveDrag(e); 
        document.addEventListener('mousemove', moveDrag);
        document.addEventListener('touchmove', moveDrag, {passive: false});
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
    }

    function moveDrag(e) {
        if(!activeDrag) return;
        e.preventDefault(); 
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        activeDrag.style.left = clientX + 'px';
        activeDrag.style.top = clientY + 'px';
    }

    function endDrag(e) {
        if(!activeDrag) return;
        let clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
        let clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
        let catRect = catGroup.getBoundingClientRect();
        
        if (clientX >= catRect.left && clientX <= catRect.right && clientY >= catRect.top && clientY <= catRect.bottom) {
            feedCat(activeDrag.dataset.name, parseInt(activeDrag.dataset.value));
        }

        activeDrag.remove(); activeDrag = null;
        document.removeEventListener('mousemove', moveDrag);
        document.removeEventListener('touchmove', moveDrag);
        document.removeEventListener('mouseup', endDrag);
        document.removeEventListener('touchend', endDrag);
    }

    function toggleFoodTray() {
        if (gameState.isSleeping) { showReaction("Wake her up first."); return; }
        let tray = document.getElementById('food-tray');
        tray.innerHTML = ""; 
        
        let foods = (gameState.phase === 4) 
            ? [{n: "Warm Milk", v: 20, code: svgFood.milk}, {n: "Kitten Mash", v: 25, code: svgFood.can}]
            : [{n: "Fresh Fish", v: 30, code: svgFood.fish}, {n: "Canned Food", v: 25, code: svgFood.can}];

        foods.forEach(f => {
            let div = document.createElement('div');
            div.className = 'draggable-food';
            div.innerHTML = f.code;
            div.onmousedown = (e) => startDrag(e, f.n, f.v, f.code);
            div.ontouchstart = (e) => startDrag(e, f.n, f.v, f.code);
            tray.appendChild(div);
        });
        tray.classList.toggle('hidden');
    }

    // --- AUTONOMOUS FELINE BEHAVIOR (Brain) ---
    function startFelineBrain() {
        clearInterval(behaviorInterval);
        behaviorInterval = setInterval(() => {
            if (gameState.isSleeping || document.getElementById('food-tray').classList.contains('hidden') === false) return;
            
            let chance = Math.random();
            if (chance < 0.2) {
                // Roam (Move to random X coordinate)
                let newX = 20 + Math.random() * 60; // Between 20% and 80% screen width
                if (newX < parseFloat(catGroup.style.left || 50)) {
                    catGroup.style.transform = "translate(-50%, -50%) scaleX(-1)"; // Face left
                } else {
                    catGroup.style.transform = "translate(-50%, -50%) scaleX(1)"; // Face right
                }
                catGroup.style.left = newX + '%';
                showReaction(`${gameState.name} is wandering around...`);
            } 
            else if (chance < 0.3) {
                // Grooming
                triggerAnimation('anim-groom');
                showReaction(`${gameState.name} is grooming her fur.`);
            }
            else if (chance < 0.4) {
                // Zoomies
                triggerAnimation('anim-play');
                catGroup.style.left = (10 + Math.random() * 80) + '%';
                showReaction(`${gameState.name} got the sudden zoomies!`);
            }
            else if (chance < 0.5) {
                // Stretching
                triggerAnimation('anim-stretch');
                showReaction(`${gameState.name} is doing a big stretch.`);
            }
            else {
                // Just breathing/idle
                setIdleState();
                showReaction(`${gameState.name} is relaxing.`);
            }
        }, 6000); // Decides a new behavior every 6 seconds
    }

    // --- AGING MATH: 1 Real Day = 4 Cat Years ---
    function calculateTimeDrain() {
        if (!gameState.lastPlayed || !gameState.startDate) return;
        let msPassed = Date.now() - gameState.lastPlayed;
        let hoursPassed = msPassed / (1000 * 60 * 60);
        
        if (hoursPassed > 1) {
            gameState.hunger = Math.max(0, Math.floor(gameState.hunger - (hoursPassed * 4)));
            if (!gameState.isSleeping) gameState.energy = Math.max(0, Math.floor(gameState.energy - (hoursPassed * 3)));
        }
        
        // 4 Years per 24 hours (1 year every 6 hours)
        let totalMs = Date.now() - gameState.startDate;
        let yearsPassed = Math.floor(totalMs / (1000 * 60 * 60 * 6));
        gameState.age = 1 + yearsPassed;
        
        checkLifeEvents();
    }

    function init() {
        let saved = localStorage.getItem('ragdoll_save_v5');
        if (saved) {
            gameState = JSON.parse(saved);
            document.querySelector('.opening-title').innerText = "WELCOME BACK";
            document.getElementById('main-cat-name').style.display = 'none'; 
            calculateTimeDrain();
        }
        setIdleState();
    }

    function startGame() {
        let nameInput = document.getElementById('main-cat-name');
        if (nameInput.style.display !== 'none' && nameInput.value.trim() !== "") {
            gameState.name = nameInput.value;
            gameState.startDate = Date.now();
        }
        gameState.lastPlayed = Date.now();
        document.getElementById('start-modal').style.display = 'none';
        
        let bgm = document.getElementById('audio-bgm');
        if(bgm) { bgm.volume = 0.3; bgm.play().catch(e => console.log(e)); }
        
        updateUI(); 
        startFelineBrain(); // Start autonomous behavior
        showReaction(`${gameState.name} entered the room.`);
    }

    function saveData() {
        gameState.lastPlayed = Date.now();
        localStorage.setItem('ragdoll_save_v5', JSON.stringify(gameState));
    }

    function playAudio(id) {
        let sound = document.getElementById(id);
        if (sound) { sound.currentTime = 0; sound.play().catch(e => console.log(e)); }
    }

    function triggerAnimation(animationClass) {
        allSprites.forEach(sprite => {
            if (!sprite.classList.contains('hidden')) {
                sprite.className = `kitten-sprite ${animationClass}`;
                if (sprite.id === 'cat-sprite') sprite.className = `main-sprite ${animationClass}`;
            }
        });
        clearTimeout(animationTimeout);
        animationTimeout = setTimeout(() => {
            if (!gameState.isSleeping) setIdleState();
        }, 2000);
    }

    function feedCat(foodName, hungerValue) {
        gameState.hunger = Math.min(100, gameState.hunger + hungerValue);
        showReaction(`Eating ${foodName}...`);
        playAudio('audio-eat');
        triggerAnimation('anim-eat'); 
        document.getElementById('food-tray').classList.add('hidden'); 
        saveData(); updateUI();
    }

    function action(type) {
        if (gameState.isSleeping && type !== 'sleep') { showReaction("Shh... sleeping."); return; }
        calculateTimeDrain();

        if (type === 'play') {
            if (gameState.energy < 15) { showReaction("Too tired to play."); return; }
            gameState.energy -= 15;
            showReaction("Playing! 🧶"); playAudio('audio-meow'); triggerAnimation('anim-play');
        } else if (type === 'cuddle') {
            showReaction("Purring happily."); triggerAnimation('anim-cuddle');
        } else if (type === 'sleep') {
            gameState.isSleeping = !gameState.isSleeping;
            if (gameState.isSleeping) {
                showReaction("Falling asleep..."); 
                document.getElementById('btn-sleep').innerHTML = "Wake Up";
                document.getElementById('bg-layer').style.filter = "brightness(0.2)";
                triggerAnimation('anim-sleep');
            } else {
                gameState.energy = Math.min(100, gameState.energy + 50);
                showReaction("Waking up!"); 
                document.getElementById('btn-sleep').innerHTML = `<svg class="svg-icon" viewBox="0 0 24 24" fill="#a29bfe"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg> Sleep`;
                document.getElementById('bg-layer').style.filter = "brightness(1)";
                setIdleState();
            }
        }
        saveData(); updateUI();
    }

    function checkLifeEvents() {
        if (gameState.phase === 4) return;
        // Adjusted to Years based on the new 1 day = 4 years math
        if (gameState.age >= 16 && gameState.phase < 4) {
            document.getElementById('kitten-modal').style.display = 'flex';
        } else if (gameState.age >= 12 && gameState.phase < 3) {
            gameState.phase = 3; showReaction(`Marriage Day!`);
        } else if (gameState.age >= 8 && gameState.phase < 2) {
            gameState.phase = 2; showReaction(`Met Akira!`);
        }
    }

    function saveKittens() {
        gameState.kittens.k1 = document.getElementById('k1').value || "Kit1";
        gameState.kittens.k2 = document.getElementById('k2').value || "Kit2";
        gameState.kittens.k3 = document.getElementById('k3').value || "Kit3";
        gameState.phase = 4; document.getElementById('kitten-modal').style.display = 'none';
        showReaction("Welcome to the family!"); saveData(); setIdleState(); updateUI();
    }

    function updateUI() {
        document.getElementById('stat-food').innerText = gameState.hunger;
        document.getElementById('stat-energy').innerText = gameState.energy;
        let p = gameState.phase === 4 ? "Family" : "Adult";
        document.getElementById('age-display').innerText = `${p} Era: ${gameState.age} Yrs`;
    }

    function setIdleState() {
        if (gameState.phase >= 2) catSprite.src = 'akira.png';
        else catSprite.src = 'cat.png';
        
        if (gameState.phase === 4) {
            allSprites[1].classList.remove('hidden'); 
            allSprites[2].classList.remove('hidden'); 
            allSprites[3].classList.remove('hidden');
        }

        let anim = gameState.isSleeping ? 'anim-sleep' : 'anim-breathe';
        allSprites.forEach(sprite => {
            if (!sprite.classList.contains('hidden')) {
                sprite.className = `kitten-sprite ${anim}`;
                if (sprite.id === 'cat-sprite') sprite.className = `main-sprite ${anim}`;
            }
        });
    }

    window.onload = init;
</script>
</body>
</html>
